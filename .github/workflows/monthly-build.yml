name: Monthly Build

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  check_commits:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Check for commits since last tag
      id: commit_check
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0)
        COMMIT_COUNT=$(git rev-list --count ${LAST_TAG}..HEAD)
        echo "Number of commits since last tag: $COMMIT_COUNT"
        if [ "$COMMIT_COUNT" -ge 5 ]; then
          echo "commits_exist=true" >> $GITHUB_ENV
        else
          echo "commits_exist=false" >> $GITHUB_ENV
        fi

  build:
    runs-on: ubuntu-latest
    needs: check_commits
    if: env.commits_exist == 'true'
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up CUDA 12.8
      run: |
        # Add your CUDA setup commands here

    - name: Build with CMake and Ninja
      run: |
        mkdir build && cd build
        cmake -G Ninja ..
        ninja

    - name: Package binaries
      run: |
        zip -r binaries.zip ./build

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag: ${{ github.ref }}
        files: binaries.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
