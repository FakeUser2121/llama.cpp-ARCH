name: Manual Release Upload

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload assets to'
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts from last release build
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            ./artifacts/**/*.tar.gz
            ./artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
