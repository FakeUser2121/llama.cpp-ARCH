name: Build and Release llama.cpp
on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compiler Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Install CUDA & Build Tools
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.8'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev ccache ninja-build zip

      - name: Configure CMake
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          cmake -B build -G Ninja \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES=86 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release

      - name: Package Binaries
        run: |
          mkdir -p dist
          # Copy executables (modern llama.cpp uses llama- prefix)
          cp build/bin/llama-* dist/ 2>/dev/null || cp build/bin/* dist/
          # Copy shared libraries
          cp build/bin/*.so dist/ 2>/dev/null || true
          cp build/*.so dist/ 2>/dev/null || true
          cd dist && zip -r ../llama-rtx3060-linux.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master'
        with:
          files: llama-rtx3060-linux.zip
          tag_name: latest
          name: "Latest Build (RTX 3060)"
          body: "Automated CUDA build for RTX 3060 (Ampere)."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
