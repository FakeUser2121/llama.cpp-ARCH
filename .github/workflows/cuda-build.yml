name: Build llama.cpp (High-Speed CUDA)
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. THE CACHE: Stores compiled object files to skip re-compiling unchanged code.
      - name: Compiler Cache
        uses: actions/cache@v4 # Using v4 for stability; v5 works similarly
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Install CUDA & Build Tools
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.4.0'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev ccache ninja-build

      - name: Configure CMake
        # We use Ninja here—it's significantly faster than 'make' for C++
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          cmake -B build -G Ninja \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES=86 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: llama-cuda-rtx3060
          # Compression level 0-9; 1 is faster and usually enough
          compression-level: 1
          path: |
            build/bin/
            build/**/*.so
            build/**/*.a
